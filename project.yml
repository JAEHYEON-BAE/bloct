name: Bloct
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

schemes:
  Bloct:
    build:
      targets:
        Bloct: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  Bloct:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Bloct
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.Bloct
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Bloct/Info.plist
      properties:
        CFBundleName: Bloct
        CFBundleDisplayName: Bloct
        CFBundleDocumentTypes:
          - CFBundleTypeExtensions:
              - md
              - markdown
            CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown
            UTTypeConformsTo:
              - public.text
            UTTypeTagSpecification:
              "public.filename-extension":
                - md
                - markdown
