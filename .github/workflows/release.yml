name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild -project Bloct.xcodeproj \
            -target Bloct \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=build/Release

      - name: Zip app
        run: |
          ditto -c -k --keepParent \
            build/Release/Bloct.app \
            Bloct.zip

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} Bloct.zip \
            --title "Bloct ${{ github.ref_name }}" \
            --generate-notes
