name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild -project MarkdownViewer.xcodeproj \
            -target MarkdownViewer \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=build/Release

      - name: Zip app
        run: |
          ditto -c -k --keepParent \
            build/Release/MarkdownViewer.app \
            MarkdownViewer.zip

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} MarkdownViewer.zip \
            --title "MarkdownViewer ${{ github.ref_name }}" \
            --generate-notes
